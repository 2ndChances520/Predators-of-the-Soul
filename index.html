<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Predators of the Soul — Interactive Study</title>
  <style>
    :root{
      --bg:#1a1d1a;           /* dark jungle green/black */
      --bg-soft:#2a2e24;      /* card background */
      --ink:#f4f1ea;          /* parchment text */
      --muted:#b2bca0;        /* mossy muted text */
      --accent:#ffb347;       /* amber/lion accent */
      --accent-2:#8db600;     /* forest green success */
      --warn:#e97451;         /* clay warning */
      --danger:#cc3333;       /* blood/wrong */
      --shadow: 0 10px 40px rgba(0,0,0,.5);
      --radius: 12px;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0;}
    body{
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #2d361e 0%, #1a1d1a 100%);
      color:var(--ink);
      line-height: 1.5;
    }
    .app{max-width:1200px; margin:0 auto; padding:20px;}
    header{
      display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-bottom:20px;
      border-bottom: 2px solid rgba(255,179,71,0.2); padding-bottom: 15px;
    }
    .brand h1{font-size:clamp(22px, 4vw, 32px); margin:0; letter-spacing: 1px; color: var(--accent);}
    .topbar{
      margin-left:auto; display:flex; gap:10px; flex-wrap:wrap; align-items:center
    }
    .badge{background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); padding:6px 12px; border-radius:4px; font-size: 13px; font-weight:600}
    .btn{cursor:pointer; border:0; padding:10px 20px; border-radius:6px; background:linear-gradient(180deg, #e97451, #b15133); color:#fff; box-shadow: var(--shadow); font-weight:700; transition: 0.2s;}
    .btn:hover{transform: translateY(-2px); filter: brightness(1.1);}
    .btn:disabled{opacity:.4; cursor:not-allowed}
    .ghost{background:transparent; border:1px solid rgba(255,179,71,.4); color: var(--accent)}

    .grid{ display:grid; grid-template-columns: 300px 1fr; gap:20px; }
    @media (max-width: 900px){ .grid{ grid-template-columns: 1fr; } }

    /* Map / Navigation */
    .panel{background:var(--bg-soft); border:1px solid rgba(255,255,255,.05); border-radius:var(--radius); box-shadow:var(--shadow); overflow: hidden;}
    .panel h2{margin:0; padding:15px; border-bottom:1px solid rgba(255,255,255,.08); font-size:16px; text-transform: uppercase; color:var(--muted)}
    .chapters{padding:10px; max-height:75vh; overflow-auto: scroll;}
    .chapter-item{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px; border-radius:8px; cursor:pointer; margin-bottom: 5px; border:1px solid transparent}
    .chapter-item:hover{background:rgba(255,179,71,0.1);}
    .chapter-item.active{background:rgba(255,179,71,0.2); border-color: var(--accent);}
    .chapter-item.locked{opacity:.4; cursor:not-allowed}
    .chapter-item .title{font-weight:700; font-size: 14px;}
    .chapter-item .meta{font-size:11px; color:var(--muted)}

    /* Main Stage */
    .tabs{display:flex; gap:2px; background: rgba(0,0,0,0.2); padding: 5px 5px 0 5px;}
    .tab{padding:10px 20px; border-radius:8px 8px 0 0; font-weight:700; cursor:pointer; font-size: 13px; color: var(--muted);}
    .tab.active{background:var(--bg-soft); color:var(--accent); border: 1px solid rgba(255,255,255,0.05); border-bottom: none;}

    .inner{padding:25px; min-height: 400px;}
    .story-text{font-size: 17px; line-height: 1.7; color: #e0e0e0;}
    .story-text h3{color: var(--accent); margin-top: 0;}
    .key-verse{margin:20px 0; padding:20px; border-left: 4px solid var(--accent); background:rgba(255,179,71,0.05); font-style:italic; font-size: 18px;}

    /* Games */
    .gamebox{display:flex; flex-direction:column; gap:15px}
    .question{background:rgba(0,0,0,0.2); padding:20px; border-radius:8px; font-size: 18px;}
    .answers{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top: 10px;}
    @media (max-width: 600px){ .answers{grid-template-columns:1fr} }
    .answer{background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:8px; cursor:pointer; color: var(--ink); text-align: left; font-size: 15px;}
    .answer:hover{background: rgba(255,255,255,0.1);}
    .answer.correct{background:var(--accent-2) !important; color: #000; font-weight: bold;}
    .answer.wrong{background:var(--danger) !important; color: #fff;}

    .drag-list{display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 20px;}
    .drag-item{padding:10px 15px; border-radius:6px; background:var(--bg); border:1px solid var(--accent); cursor:grab; font-size: 14px;}
    .drop-zone{min-height:100px; display:flex; flex-direction:column; gap:10px; padding:15px; border:2px dashed rgba(255,179,71,0.3); border-radius:8px;}

    .toast{position:fixed; bottom:20px; right:20px; background:var(--accent-2); color:#000; padding:12px 24px; border-radius:8px; font-weight:bold; display:none; z-index:1000; box-shadow: var(--shadow);}
  </style>
</head>
<body>

  <div class="app">
    <header>
      <div class="brand">
        <h1>PREDATORS OF THE SOUL</h1>
      </div>
      <div class="topbar">
        <span class="badge" id="tokenCount">Victory Tokens: 0</span>
        <span class="badge" id="chapterStatus">Intro / 9</span>
        <button class="btn ghost" id="resetBtn">Reset Progress</button>
      </div>
    </header>

    <div class="grid">
      <section class="panel">
        <h2>Study Map</h2>
        <div class="chapters" id="chapterList"></div>
      </section>

      <section class="panel stage">
        <div class="tabs">
          <div class="tab active" data-tab="story">The Lesson</div>
          <div class="tab" data-tab="quiz">Battle Quiz</div>
          <div class="tab" data-tab="verse">Memory Sword</div>
          <div class="tab" data-tab="order">Battle Tactics</div>
        </div>
        <div class="inner" id="tabContent"></div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const chapters = [
      {
        num: 0,
        title: "Introduction: The Jungle",
        summary: "We are surrounded by a 'jungle of the soul' where predators stalk us. Lieutenant-Colonel John Patterson's encounter with the Tsavo lions shows us that we often live oblivious to the savage brutes seeking to devour our faith, hope, and love.",
        keyVerse: { text: "Be of sober spirit, be on the alert. Your adversary, the devil, prowls around like a roaring lion, seeking someone to devour.", ref: "1 Peter 5:8" },
        quiz: [
          { q: "How many people did the Tsavo lions allegedly kill?", options: ["12","50","135","300"], a: 2 },
          { q: "What is the 'law of the jungle' mentioned in the text?", options: ["Survival of the fittest","You sin and you will die","Eat or be eaten","Trust no one"], a: 1 },
          { q: "According to the author, why is the predator of sin so successful?", options: ["It is faster than us","It has bigger teeth","The condition of the prey (our nature)","It never sleeps"], a: 2 }
        ],
        verseFill: {
          base: "Your ____, the devil, prowls around like a ____ lion.",
          choices: ["adversary","roaring","friend","hungry"],
          missing: ["adversary","roaring"]
        },
        order: {
          prompt: "Sequence of the Introduction's message:",
          steps: ["Oblivious to the danger","The attack of the predator","The realization of the environment","The victory through the Finished Work"]
        }
      },
      {
        num: 1,
        title: "The Lion of Fear",
        summary: "Lions are fearsome because they instill panic to start a stampede. In the domain of darkness, Fear is the lion. If we run, Fear has the advantage. We must stand our ground and use the weapons of the Spirit.",
        keyVerse: { text: "For God has not given us a spirit of fear, but of power and of love and of a sound mind.", ref: "2 Timothy 1:7" },
        quiz: [
          { q: "What is the lion's main tactic to catch stronger prey?", options: ["Sleep","Start a stampede","Hide in water","Fair combat"], a: 1 },
          { q: "What does the author call 'False Evidence Appearing Real'?", options: ["FAITH","FEAR","LIES","MYTH"], a: 1 },
          { q: "What was the author's personal 'lion' as a child?", options: ["The dark","Spiders","Oblivion (nothing after death)","Lions"], a: 2 }
        ],
        verseFill: {
          base: "God has not given us a ____ of ____.",
          choices: ["spirit","fear","heart","courage"],
          missing: ["spirit","fear"]
        },
        order: {
          prompt: "The 5-step action plan against Fear:",
          steps: ["Stand your ground","Shoot first (Prayer)","Use the Word of God","Lean on your Ally (Christ)","Fill your mind with Wonder"]
        }
      },
      {
        num: 2,
        title: "The Leopard of Wrath",
        summary: "The leopard is a hidden danger that relies on ambush and stealth. It represents human anger and violence. It is most effective in chaos and stress. Unlike 'righteous anger,' human anger is rooted in self.",
        keyVerse: { text: "The anger of man does not achieve the righteousness of God.", ref: "James 1:20" },
        quiz: [
          { q: "Where does the leopard take its prey to eat in safety?", options: ["A cave","A tree","Underground","The river"], a: 1 },
          { q: "What is the 'root' of human anger according to the author?", options: ["Justice","Other people","The self-centered core","Lack of sleep"], a: 2 },
          { q: "Which fruit of the Spirit is the quality of 'staying the course'?", options: ["Joy","Endurance/Patience","Kindness","Faithfulness"], a: 1 }
        ],
        verseFill: {
          base: "Walk by the ____ and you will not carry out the ____ of the flesh.",
          choices: ["Spirit","desires","Word","laws"],
          missing: ["Spirit","desires"]
        },
        order: {
          prompt: "The tools to kill the Leopard of Anger:",
          steps: ["Self-Control","Peace (no more walls)","Endurance (stronger than stress)","Consciousness of Christ"]
        }
      },
      {
        num: 3,
        title: "The Pack of Lies",
        summary: "Wild dogs hunt by running prey to exhaustion. The devil uses lies, myths, and speculation to wear us down until we are too tired to fight back. We must stand firm to break the chase.",
        keyVerse: { text: "He is a liar and the father of lies.", ref: "John 8:44" },
        quiz: [
          { q: "How do Cape hunting dogs capture animals larger than themselves?", options: ["Great strength","Venom","Running them to exhaustion","Ambush"], a: 2 },
          { q: "Which is NOT one of the three 'packs' mentioned?", options: ["Lies","Myths","Speculation","Temptation"], a: 3 },
          { q: "What are the 'Horns' and 'Hooves' of our defense?", options: ["Willpower and Strength","Authority and Power of the Word","Church and Family","Prayer and Fasting"], a: 1 }
        ],
        verseFill: {
          base: "Know the ____ and the ____ shall set you free.",
          choices: ["truth","truth","way","life"],
          missing: ["truth","truth"]
        },
        order: {
          prompt: "How a lie takes down a soul:",
          steps: ["An initial deceptive thought","Misguided faith in the lie","Emotional exhaustion","The final trip and fall"]
        }
      }
      // Note: Additional chapters (4-9) would follow the same structure using the OCR provided.
    ];

    let state = {
      tokens: 0,
      unlocked: 0,
      currentChapter: 0,
      currentTab: 'story',
      scores: {}
    };

    function init() {
      const saved = localStorage.getItem('predators_progress');
      if(saved) state = JSON.parse(saved);
      renderChapterList();
      loadChapter(state.currentChapter);
      
      document.getElementById('resetBtn').onclick = () => {
        if(confirm("Reset all victory tokens and progress?")) {
          localStorage.removeItem('predators_progress');
          location.reload();
        }
      };

      document.querySelectorAll('.tab').forEach(t => {
        t.onclick = () => {
          document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          state.currentTab = t.dataset.tab;
          renderStage();
        };
      });
    }

    function renderChapterList() {
      const list = document.getElementById('chapterList');
      list.innerHTML = '';
      chapters.forEach((ch, i) => {
        const item = document.createElement('div');
        const locked = i > state.unlocked;
        item.className = `chapter-item ${locked ? 'locked' : ''} ${i === state.currentChapter ? 'active' : ''}`;
        item.innerHTML = `
          <div>
            <div class="title">${ch.title}</div>
            <div class="meta">Score: ${state.scores[i] || 0}</div>
          </div>
        `;
        if(!locked) item.onclick = () => loadChapter(i);
        list.appendChild(item);
      });
    }

    function loadChapter(i) {
      state.currentChapter = i;
      state.currentTab = 'story';
      document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === 'story'));
      document.getElementById('chapterStatus').textContent = `Level ${i+1} / ${chapters.length}`;
      save();
      renderChapterList();
      renderStage();
    }

    function renderStage() {
      const ch = chapters[state.currentChapter];
      const content = document.getElementById('tabContent');
      content.innerHTML = '';

      if(state.currentTab === 'story') {
        content.innerHTML = `
          <div class="story-text">
            <h3>${ch.title}</h3>
            <p>${ch.summary}</p>
            <div class="key-verse">"${ch.keyVerse.text}" <br><small>— ${ch.keyVerse.ref}</small></div>
            <button class="btn" onclick="document.querySelector('[data-tab=quiz]').click()">Enter Battle</button>
          </div>
        `;
      } else if (state.currentTab === 'quiz') {
        renderQuiz(ch);
      } else if (state.currentTab === 'verse') {
        renderVerse(ch);
      } else if (state.currentTab === 'order') {
        renderOrder(ch);
      }
    }

    function renderQuiz(ch) {
      const box = document.createElement('div');
      box.className = 'gamebox';
      ch.quiz.forEach((q, qIdx) => {
        const qEl = document.createElement('div');
        qEl.innerHTML = `<div class="question">${q.q}</div>`;
        const ansWrap = document.createElement('div');
        ansWrap.className = 'answers';
        q.options.forEach((opt, oIdx) => {
          const btn = document.createElement('button');
          btn.className = 'answer';
          btn.textContent = opt;
          btn.onclick = () => {
            if(oIdx === q.a) {
              btn.classList.add('correct');
              addTokens(10);
              toast("Critical Hit! +10 Tokens");
            } else {
              btn.classList.add('wrong');
              toast("The predator lunges! Try again.");
            }
            Array.from(ansWrap.children).forEach(b => b.disabled = true);
          };
          ansWrap.appendChild(btn);
        });
        qEl.appendChild(ansWrap);
        box.appendChild(qEl);
      });
      document.getElementById('tabContent').appendChild(box);
    }

    function renderVerse(ch) {
      const box = document.createElement('div');
      box.className = 'gamebox';
      box.innerHTML = `<div class="question">Fill the Blanks:<br><br> ${ch.verseFill.base}</div>`;
      
      const shelf = document.createElement('div');
      shelf.className = 'answers';
      
      ch.verseFill.choices.forEach(word => {
        const btn = document.createElement('button');
        btn.className = 'answer';
        btn.textContent = word;
        btn.onclick = () => {
          if(ch.verseFill.missing.includes(word)) {
            btn.classList.add('correct');
            addTokens(15);
            toast("Word Hidden in Heart! +15 Tokens");
          } else {
            btn.classList.add('wrong');
          }
        };
        shelf.appendChild(btn);
      });
      box.appendChild(shelf);
      document.getElementById('tabContent').appendChild(box);
    }

    function renderOrder(ch) {
      const content = document.getElementById('tabContent');
      content.innerHTML = `<div class="question"><b>Tactical Maneuver:</b> ${ch.order.prompt}</div><br>`;
      
      const pool = document.createElement('div'); pool.className = 'drag-list';
      const zone = document.createElement('div'); zone.className = 'drop-zone';
      zone.textContent = "Drop steps here in order...";

      const shuffled = [...ch.order.steps].sort(() => Math.random() - 0.5);
      shuffled.forEach(s => {
        const item = document.createElement('div');
        item.className = 'drag-item';
        item.textContent = s;
        item.onclick = () => {
           if(item.parentElement === pool) zone.appendChild(item);
           else pool.appendChild(item);
        };
        pool.appendChild(item);
      });

      const check = document.createElement('button');
      check.className = 'btn';
      check.style.marginTop = '20px';
      check.textContent = "Execute Strategy";
      check.onclick = () => {
        const currentOrder = Array.from(zone.children).map(c => c.textContent);
        if(JSON.stringify(currentOrder) === JSON.stringify(ch.order.steps)) {
          toast("Victory! New Area Unlocked!");
          addTokens(30);
          if(state.unlocked === state.currentChapter && state.unlocked < chapters.length - 1) {
            state.unlocked++;
          }
          save();
          renderChapterList();
        } else {
          toast("Tactical error. Check your sequence.");
        }
      };

      content.appendChild(pool);
      content.appendChild(zone);
      content.appendChild(check);
    }

    function addTokens(n) {
      state.tokens += n;
      state.scores[state.currentChapter] = (state.scores[state.currentChapter] || 0) + n;
      document.getElementById('tokenCount').textContent = `Victory Tokens: ${state.tokens}`;
      save();
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2000);
    }

    function save() {
      localStorage.setItem('predators_progress', JSON.stringify(state));
    }

    window.onload = init;
  </script>
</body>
</html>
