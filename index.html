<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predators of the Soul: Study Game</title>
    <style>
        :root {
            --bg-deep: #0a0f0d;
            --bg-panel: #161d1a;
            --bg-sidebar: #050807;
            --accent-primary: #22c55e;
            --accent-secondary: #eab308;
            --text-main: #f0fdf4;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-main);
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(10, 15, 13, 0.95);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
            z-index: 100;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-left { display: flex; align-items: center; gap: 0.8rem; }
        
        .logo-circle {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: black; font-size: 0.8rem;
        }

        h1 { font-size: 1.1rem; }

        .stats-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        .badge-pill {
            background: rgba(255,255,255,0.05);
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            white-space: nowrap;
            display: flex; align-items: center; gap: 0.4rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .app-container { display: flex; flex: 1; overflow: hidden; flex-direction: column; }

        /* Mobile-First Sidebar (Horizontal Scroll) */
        .sidebar {
            width: 100%;
            background: var(--bg-sidebar);
            border-bottom: 1px solid rgba(34, 197, 94, 0.1);
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            white-space: nowrap;
            padding: 8px;
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }

        .chapter-card {
            display: inline-block;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 8px 12px;
            margin-right: 8px;
            cursor: pointer;
            min-width: 120px;
        }
        .chapter-card.active { border-color: var(--accent-secondary); background: rgba(234, 179, 8, 0.1); }
        .chapter-card.locked { opacity: 0.3; pointer-events: none; }
        .chapter-num { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
        .chapter-title { font-weight: 600; font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; }

        /* Stage */
        .stage { flex: 1; display: flex; flex-direction: column; background: var(--bg-panel); overflow: hidden; }
        
        .tabs { 
            display: flex; 
            background: rgba(0,0,0,0.3); 
            overflow-x: auto;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tab {
            flex: 1; min-width: 80px; text-align: center;
            padding: 0.8rem 0.5rem; cursor: pointer; color: var(--text-muted); font-size: 0.7rem;
            font-weight: 700; border-bottom: 3px solid transparent; text-transform: uppercase;
        }
        .tab.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); background: rgba(255,255,255,0.02); }

        .tab-content { flex: 1; padding: 1.2rem; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        /* Content Styles */
        .story-header { color: var(--accent-secondary); margin-bottom: 1rem; font-size: 1.4rem; line-height: 1.2; }
        .quote-box {
            border-left: 3px solid var(--accent-primary);
            padding: 1rem; font-style: italic; margin: 1.5rem 0;
            background: rgba(34, 197, 94, 0.05); border-radius: 0 8px 8px 0;
            line-height: 1.5; color: #cbd5e1; font-size: 0.95rem;
        }

        /* Responsive Grids */
        .quiz-grid { display: grid; grid-template-columns: 1fr; gap: 0.8rem; margin-top: 1rem; }
        .quiz-btn, .verse-option-btn {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem; border-radius: 8px; color: var(--text-main); cursor: pointer;
            font-size: 0.9rem; width: 100%; text-align: left;
        }
        
        .verse-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1.5rem; }
        .verse-option-btn { width: auto; padding: 8px 12px; }

        /* IMPROVED ORDERING UI */
        .order-item {
            background: rgba(255,255,255,0.04); padding: 0.8rem; margin-bottom: 0.6rem;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .order-controls { display: flex; flex-direction: column; gap: 4px; }
        .move-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; cursor: pointer;
        }
        .order-text { flex: 1; font-size: 0.85rem; line-height: 1.3; }

        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); width: 0%; transition: width 0.4s ease; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--accent-primary); color: black; padding: 0.8rem 1.5rem;
            border-radius: 30px; z-index: 2000; font-weight: bold; font-size: 0.9rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: max-content;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Desktop Adjustments */
        @media (min-width: 850px) {
            .app-container { flex-direction: row; }
            .sidebar { width: 280px; flex-direction: column; overflow-x: hidden; overflow-y: auto; border-right: 1px solid rgba(34, 197, 94, 0.1); }
            .chapter-card { display: block; margin-right: 0; margin-bottom: 8px; white-space: normal; }
            header { flex-direction: row; padding: 1rem 2rem; }
            .tab-content { padding: 2.5rem; }
            .quiz-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="header-left">
                <div class="logo-circle">PS</div>
                <h1>Predators</h1>
            </div>
            <button onclick="resetGame()" style="background:none; border: 1px solid var(--danger); color:var(--danger); padding:4px 8px; border-radius:4px; font-size:0.6rem; font-weight:bold;">RESET</button>
        </div>
        <div class="stats-bar">
            <div class="badge-pill">
                <span style="color: var(--accent-secondary);">🐾</span>
                <span class="token-count">0</span> Tokens
            </div>
            <div class="badge-pill progress-badge">
                <span>Expedition: 1/9</span>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="chapterList"></aside>

        <main class="stage">
            <nav class="tabs">
                <div class="tab active" data-tab="story" onclick="switchTab('story')">Encounter</div>
                <div class="tab" data-tab="quiz" onclick="switchTab('quiz')">Combat</div>
                <div class="tab" data-tab="verse" onclick="switchTab('verse')">Sword</div>
                <div class="tab" data-tab="order" onclick="switchTab('order')">Strategy</div>
            </nav>

            <div id="story" class="tab-content active"></div>
            <div id="quiz" class="tab-content"></div>
            <div id="verse" class="tab-content"></div>
            <div id="order" class="tab-content"></div>
        </main>
    </div>

    <div id="toast" class="toast">Target Neutralized!</div>

    <script>
        const gameData = [
            {
                num: 1, icon: "🦁", title: "Valley of Lions", predator: "FEAR",
                summary: "Fear stalks the periphery of our lives to consume our faith. Like Patterson's Tsavo lions, fear roars to cause a stampede of emotions.",
                quote: "What is a lion to a mountain? Your trust in God makes you secure.",
                questions: [
                    {q:"In the book, what was the 'meanest lion'?", a:["Failure","Oblivion","Death","Sickness"], c:1},
                    {q:"What is the basis for all human fear?", a:["The Law","Knowledge of Good/Evil","The Wilderness","Pharaoh"], c:1},
                    {q:"First response of Nehemiah to fear?", a:["Analysis","Flight","Prayer","Hiding"], c:2}
                ],
                fill: {text: "Be of ____ spirit, be on the ____. Your adversary, the devil, prowls around like a roaring ____.", words: ["sober", "alert", "lion"], options: ["sober", "alert", "brave", "lion", "tiger"]},
                order: ["Stand your ground", "Shoot first (Prayer)", "Use the Word of God", "Lean upon Christ", "Fill your mind with wonder"]
            },
            {
                num: 2, icon: "🐆", title: "Leopard Shadows", predator: "ANGER & WRATH",
                summary: "The leopard relies on stealth and stress. Human anger arises from injury or spoiled plans; it is a cunning killer.",
                quote: "Walking in the Spirit will control your anger.",
                questions: [
                    {q:"When is the leopard most effective?", a:["Speed","Strength","Stress","Hunger"], c:2},
                    {q:"Anger of man does not achieve...?", a:["Success","The Righteousness of God","Peace","Respect"], c:1},
                    {q:"The 'silent revenge of the soul'?", a:["Bitterness","Holding on to anger","Silence","Justice"], c:1}
                ],
                fill: {text: "Walk by the ____ and you will not carry out the ____ of the ____.", words: ["Spirit", "desires", "flesh"], options: ["Spirit", "desires", "works", "mind", "flesh"]},
                order: ["Stress mounts in life", "The Leopard sees an opening", "The person stews on the problem", "Social boundaries melt away", "Explosion of anger"]
            },
            {
                num: 3, icon: "🐕", title: "Running with the Pack", predator: "LIES & MYTHS",
                summary: "The devil uses lies and cultural myths to wear down the saints until they trip and fall.",
                quote: "Chaos is the predator's ally. Lies drive; truth leads.",
                questions: [
                    {q:"Secret to defeating 'dogs' of the soul?", a:["Speed","Fighting alone","Standing firm","Ignoring them"], c:2},
                    {q:"Most ferocious 'dog'?", a:["Lies","Myths","Speculation","Gossip"], c:2},
                    {q:"Our 'Utility Belt' weapon?", a:["Faith","The Church","The Word of God","Prayer"], c:2}
                ],
                fill: {text: "The 'horns' are the ____ of God's Word, and the 'hoofs' are the ____ of God's Word.", words: ["authority", "power"], options: ["authority", "logic", "power", "grace"]},
                order: ["The enemy plants a lie", "We run with the thought", "Exhaustion sets in", "The predator trips the prey", "The soul is devoured"]
            },
            {
                num: 4, icon: "🐃", title: "Staying with the Herd", predator: "ISOLATION",
                summary: "Predators separate the prey from the group. 'Rugged individualism' is a dangerous opening for predators.",
                quote: "A pilot who abandons his wingman is not brave—he’s stupid.",
                questions: [
                    {q:"Animal group protecting the weak?", a:["Lions","Cape Buffalo","Wild Dogs","Cheetahs"], c:1},
                    {q:"Shame-based environment?", a:["Hope-based","Grace-based","Shame-based","Faith-based"], c:2},
                    {q:"Who always had a wingman (Silas/Luke)?", a:["David","Elijah","Paul","Peter"], c:2}
                ],
                fill: {text: "Two are ____ than one... for a ____ braided cord is not easily broken.", words: ["better", "triple"], options: ["better", "stronger", "double", "triple"]},
                order: ["Isolation begins", "Self-deception takes root", "Horns and hoofs are weakened", "The predator attacks alone", "Defeat in the gulley"]
            },
            {
                num: 5, icon: "🐅", title: "Crouching Tiger", predator: "IMMORALITY",
                summary: "Sexual immorality stalks everyone. Defense is the fire of the Spirit and covenant walls.",
                quote: "You can’t make 'pets' out of this predator.",
                questions: [
                    {q:"What is the 'spear'?", a:["The Word","Prayer","Covenant","Fasting"], c:1},
                    {q:"What defines true sex?", a:["Emotion","Hormones","Marriage Covenant","Consent"], c:2},
                    {q:"Movie character using fire?", a:["Simba","Tarzan","Mowgli","Robin Hood"], c:2}
                ],
                fill: {text: "His ____ takes away our sin... redemption deals with the ____ of sin and the ____ of it as well.", words: ["blood", "act", "guilt"], options: ["blood", "love", "act", "shame", "guilt"]},
                order: ["Power of the Cross", "Spirit within (Fire)", "High walls of Covenant", "Standard of the Word", "The Spear of Prayer"]
            },
            {
                num: 6, icon: "🐊", title: "Jaws of the Crocodile", predator: "DESPAIR",
                summary: "Despair drags the soul into the murky 'death roll' of hopelessness.",
                quote: "The Spirit makes us 'crocodile proof.'",
                questions: [
                    {q:"Meaning of 'Mara'?", a:["A season","A year","A moment","A cycle"], c:0},
                    {q:"Three-letter secret?", a:["Try","Let","Win","Now"], c:1},
                    {q:"Hope is like what?", a:["A shield","Lighthouse","An anchor","Sword"], c:2}
                ],
                fill: {text: "God has given you a new ____, a new ____, and His ____ so your heart can be influenced by hope.", words: ["heart", "spirit", "Spirit"], options: ["heart", "mind", "spirit", "life", "Spirit"]},
                order: ["Realize difficult times happen", "Don't let the heart be troubled", "Abandon yourself to the Comforter", "Fill with the faith of Christ", "Hold on to the anchor of Hope"]
            },
            {
                num: 7, icon: "🐕", title: "Greed of the Hyena", predator: "MONEY",
                summary: "Greed takes small compromises until the soul is consumed. Wealth does not equal worth.",
                quote: "If the purse is open to give, it is open to receive from God.",
                questions: [
                    {q:"Root of all kinds of evil?", a:["Money","Love of Money","Poverty","Hyena"], c:1},
                    {q:"Scrooge's casualty?", a:["Wealth","Happiness","Compassion","Success"], c:2},
                    {q:"Saddest scene of walking away?", a:["Judas","Rich Young Ruler","Ananias","Lot"], c:1}
                ],
                fill: {text: "Seeking first the ____ is the fixing of life according to the way ____ works.", words: ["kingdom", "God"], options: ["profit", "kingdom", "money", "God"]},
                order: ["Small compromises made", "Desire for more seizes soul", "Equating wealth with worth", "Pierced with many griefs", "Wandering from the faith"]
            },
            {
                num: 8, icon: "🐆", title: "Tripped by Cheetah", predator: "PRIDE",
                summary: "Pride is a sleek cheetah. It trips us with speed as we try to reinvent ourselves for glory.",
                quote: "The victory over pride is not humility... it is Grace.",
                questions: [
                    {q:"Hebrew 'glory' means?", a:["Brightness","Weight/Value","Cloud","Victory"], c:1},
                    {q:"Secret weapon against pride?", a:["Self-Abuse","Fasting","Grace","Low opinion"], c:2},
                    {q:"Famous athlete illustration?", a:["Jordan","Tiger Woods","Brady","Ali"], c:1}
                ],
                fill: {text: "Everything is ____... Get out of the ____... Stop ____ the worth of others.", words: ["grace", "race", "judging"], options: ["grace", "race", "effort", "judging", "hating"]},
                order: ["Draw worth from Christ", "Everything is Grace", "Get out of the race", "Stop judging others", "Stop comparing"]
            },
            {
                num: 9, icon: "🌳", title: "The Seated Yoke", predator: "FINISHED WORK",
                summary: "The Christian life is an invitation to rest. We are God's poem, meant to walk with Him.",
                quote: "Faith is a walk, not a work.",
                questions: [
                    {q:"Meaning of 'Karpos'?", a:["Labor","Inward power evidence","Victory","Strength"], c:1},
                    {q:"Kind of yoke Christ has?", a:["Heavy","Laboring","Seated","Wooden"], c:2},
                    {q:"The 'last exhortation' in the Bible?", a:["Go","Fight","Come","Wait"], c:2}
                ],
                fill: {text: "You are God's ____... his work of art... created for ____ works.", words: ["poem", "good"], options: ["servant", "poem", "good", "great"]},
                order: ["The Tree of Knowledge (Death)", "The Cross (Victory)", "Resurrection (Release)", "Ascension (Permanent Liberty)", "The Seated Yoke (Rest)"]
            }
        ];

        let state = {
            tokens: 0,
            currentChapter: 1,
            unlockedUntil: 1,
            chapterTokens: {},
            verseProgress: [],
            currentOrder: []
        };

        function init() {
            const saved = localStorage.getItem('predatorsGameMobile');
            if (saved) state = JSON.parse(saved);
            renderSidebar();
            loadChapter(state.currentChapter);
            updateHeader();
        }

        function save() {
            localStorage.setItem('predatorsGameMobile', JSON.stringify(state));
        }

        function loadChapter(num) {
            state.currentChapter = num;
            const data = gameData[num - 1];
            
            document.querySelectorAll('.chapter-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.querySelector(`[data-num="${num}"]`);
            if(activeCard) {
                activeCard.classList.add('active');
                activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            renderStory(data);
            renderQuiz(data);
            renderVerse(data);
            renderOrder(data);
            switchTab('story');
            save();
        }

        function renderSidebar() {
            const list = document.getElementById('chapterList');
            list.innerHTML = gameData.map(ch => `
                <div class="chapter-card ${ch.num > state.unlockedUntil ? 'locked' : ''} ${ch.num === state.currentChapter ? 'active' : ''}" 
                    data-num="${ch.num}" 
                    onclick="loadChapter(${ch.num})">
                    <div class="chapter-num">CH ${ch.num}</div>
                    <div class="chapter-title">${ch.title}</div>
                </div>
            `).join('');
        }

        function updateHeader() {
            document.querySelector('.token-count').innerText = state.tokens;
            document.querySelector('.progress-badge span').innerText = `Expedition: ${state.currentChapter}/9`;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const tabBtn = document.querySelector(`[data-tab="${tabId}"]`);
            if(tabBtn) tabBtn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function renderStory(data) {
            const earned = state.chapterTokens[data.num] || 0;
            const progress = (earned / 30) * 100;
            document.getElementById('story').innerHTML = `
                <h2 class="story-header">${data.num}. ${data.title}</h2>
                <p style="color:var(--accent-primary); font-weight:bold; font-size:0.8rem; margin-bottom:10px;">PREDATOR: ${data.predator}</p>
                <p style="line-height:1.6; font-size:1rem; color:var(--text-muted);">${data.summary}</p>
                <div class="quote-box">"${data.quote}"</div>
                <div style="margin-top:2rem;">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; margin-bottom:5px;">
                        <span>KNOWLEDGE ACQUIRED</span>
                        <span>${earned}/30</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                </div>
                <button class="quiz-btn" style="margin-top:2rem; text-align:center; background:var(--accent-primary); color:black; font-weight:bold;" onclick="switchTab('quiz')">BEGIN COMBAT CHECK</button>
            `;
        }

        function renderQuiz(data) {
            const container = document.getElementById('quiz');
            container.innerHTML = `<h3 style="margin-bottom:1rem;">Survival Knowledge</h3>` + data.questions.map((q, qIdx) => `
                <div style="margin-bottom:2rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:1.5rem;">
                    <p style="font-size:1rem; margin-bottom:1rem; line-height:1.4;">${q.q}</p>
                    <div class="quiz-grid">
                        ${q.a.map((opt, aIdx) => `
                            <button class="quiz-btn" onclick="checkQuiz(this, ${data.num}, ${qIdx}, ${aIdx})">${opt}</button>
                        `).join('')}
                    </div>
                </div>
            `).join('') + `<button class="quiz-btn" style="text-align:center;" onclick="switchTab('verse')">Next: Sword Drill</button>`;
        }

        function checkQuiz(btn, chNum, qIdx, aIdx) {
            const correct = gameData[chNum-1].questions[qIdx].c;
            const parent = btn.parentElement;
            if(parent.querySelector('.correct') || parent.querySelector('.wrong')) return;
            if(aIdx === correct) {
                btn.style.background = "var(--success)";
                btn.style.color = "black";
                addTokens(chNum, 4);
                showToast("Target Hit! +4");
            } else {
                btn.style.background = "var(--danger)";
                parent.querySelectorAll('.quiz-btn')[correct].style.border = "2px solid var(--success)";
            }
        }

        function renderVerse(data) {
            state.verseProgress = [];
            const container = document.getElementById('verse');
            let display = data.fill.text;
            data.fill.words.forEach((w, i) => {
                display = display.replace("____", `<span style="color:var(--accent-secondary); font-weight:bold; border-bottom:2px solid; padding:0 5px;" id="blank-${i}">____</span>`);
            });
            container.innerHTML = `
                <h3>Sword Drill</h3>
                <p style="font-size:1.2rem; line-height:1.8; margin: 1.5rem 0; color:#cbd5e1;">${display}</p>
                <div class="verse-options">
                    ${data.fill.options.sort(() => Math.random() - 0.5).map(opt => `<button class="verse-option-btn" onclick="checkVerse(this, ${data.num})">${opt}</button>`).join('')}
                </div>
                <button class="quiz-btn" style="margin-top:2rem; text-align:center;" onclick="switchTab('order')">Next: Strategy</button>
            `;
        }

        function checkVerse(btn, chNum) {
            const data = gameData[chNum-1].fill;
            const currentIdx = state.verseProgress.length;
            if(currentIdx >= data.words.length) return;
            if(btn.innerText === data.words[currentIdx]) {
                document.getElementById(`blank-${currentIdx}`).innerText = btn.innerText;
                state.verseProgress.push(btn.innerText);
                btn.style.opacity = '0.2';
                if(state.verseProgress.length === data.words.length) {
                    addTokens(chNum, 9);
                    showToast("Verse Locked! +9");
                }
            } else {
                showToast("Try again...");
            }
        }

        // IMPROVED ORDERING LOGIC
        function renderOrder(data) {
            if(!state.currentOrder || state.currentOrder.length === 0 || state.lastOrderCh !== data.num) {
                state.currentOrder = [...data.order].sort(() => Math.random() - 0.5);
                state.lastOrderCh = data.num;
            }
            const container = document.getElementById('order');
            container.innerHTML = `
                <h3>Strategy Plan</h3>
                <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:1rem;">Use arrows to arrange steps in the correct order.</p>
                <div id="orderList"></div>
                <button class="quiz-btn" style="margin-top:1.5rem; background:var(--accent-secondary); color:black; font-weight:bold; text-align:center;" onclick="checkOrder(${data.num})">VERIFY PLAN</button>
            `;
            refreshOrderList();
        }

        function refreshOrderList() {
            const list = document.getElementById('orderList');
            list.innerHTML = state.currentOrder.map((item, i) => `
                <div class="order-item">
                    <div class="order-controls">
                        <button class="move-btn" onclick="moveItem(${i}, -1)">▲</button>
                        <button class="move-btn" onclick="moveItem(${i}, 1)">▼</button>
                    </div>
                    <div class="order-text">${item}</div>
                </div>
            `).join('');
        }

        function moveItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= state.currentOrder.length) return;
            const temp = state.currentOrder[index];
            state.currentOrder[index] = state.currentOrder[newIndex];
            state.currentOrder[newIndex] = temp;
            refreshOrderList();
        }

        function checkOrder(chNum) {
            const original = gameData[chNum-1].order;
            const isCorrect = state.currentOrder.every((val, i) => val === original[i]);

            if(isCorrect) {
                addTokens(chNum, 9);
                showToast("Perfect Strategy! +9");
                if((state.chapterTokens[chNum] || 0) >= 25 && chNum === state.unlockedUntil && state.unlockedUntil < 9) {
                    state.unlockedUntil++;
                    renderSidebar();
                    showToast("NEW CHAPTER UNLOCKED!");
                }
            } else {
                showToast("Sequence incorrect.");
            }
        }

        function addTokens(chNum, amt) {
            if(!state.chapterTokens[chNum]) state.chapterTokens[chNum] = 0;
            if(state.chapterTokens[chNum] < 30) {
                state.chapterTokens[chNum] = Math.min(30, state.chapterTokens[chNum] + amt);
                state.tokens += amt;
                updateHeader();
                save();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function resetGame() {
            if(confirm("Reset all progress?")) {
                localStorage.removeItem('predatorsGameMobile');
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
